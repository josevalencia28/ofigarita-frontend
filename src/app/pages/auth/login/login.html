<p-toast position="center" />

<div class="login-shell">

    <!-- ── Panel izquierdo: Branding ─────────────────────────────────────── -->
    <div class="login-brand">
        <div class="deco-circle c1"></div>
        <div class="deco-circle c2"></div>
        <div class="deco-circle c3"></div>

        <div class="brand-content">
            <div class="brand-logo-wrap">
                <div class="brand-logo-glow"></div>
                <img src="/logos/logoOfigarita.png" alt="Ofigarita" />
            </div>
            <p class="brand-tagline">Sistema de gestión administrativa</p>

            <div class="brand-pills">
                <div class="brand-pill">
                    <i class="pi pi-chart-bar"></i>
                    <span>Ventas y analítica en tiempo real</span>
                </div>
                <div class="brand-pill">
                    <i class="pi pi-box"></i>
                    <span>Control de inventario y compras</span>
                </div>
                <div class="brand-pill">
                    <i class="pi pi-users"></i>
                    <span>Gestión de clientes</span>
                </div>
                <div class="brand-pill">
                    <i class="pi pi-wallet"></i>
                    <span>Cartera y cobranza</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Panel derecho: Formulario ─────────────────────────────────────── -->
    <div class="login-form-side">
        <div class="login-card">

            <div class="lc-header">
                <div class="lc-icon">
                    <i class="pi pi-shield"></i>
                </div>
                <h2>Acceso al sistema</h2>
                <p>Ingresa tus credenciales para continuar</p>
            </div>

            <div class="lc-fields">

                <div class="lc-field">
                    <label>Usuario</label>
                    <div class="lc-input-wrap">
                        <i class="pi pi-user lc-input-icon"></i>
                        <input pInputText type="text" [(ngModel)]="user" placeholder="Ingresa tu usuario" />
                    </div>
                </div>

                <div class="lc-field">
                    <label>Contraseña</label>
                    <div class="lc-input-wrap lc-password-wrap">
                        <i class="pi pi-lock lc-input-icon"></i>
                        <p-password [(ngModel)]="pass" placeholder="••••••••"
                            [toggleMask]="true" [feedback]="false" [fluid]="true">
                        </p-password>
                    </div>
                </div>

                <button class="lc-submit" (click)="login()">
                    <i class="pi pi-sign-in"></i>
                    Ingresar al sistema
                </button>

            </div>

            <p class="lc-footer">Ofigarita &mdash; Todos los derechos reservados</p>
        </div>
    </div>

</div>
